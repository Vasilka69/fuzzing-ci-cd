server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: vcs-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:vcs-service-executor}
      client-id: ${KAFKA_CLIENT_ID:vcs-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ru.diplom.cicd.contracts.*
        spring.json.value.default.type: ru.diplom.cicd.contracts.job.JobMessage
    listener:
      ack-mode: manual

logging:
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:}
    json:
      context:
        include: true
      add:
        sourceService: ${spring.application.name}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

cicd:
  executor:
    topic: ${CICD_EXECUTOR_TOPIC:jobs.vcs}
    worker-id: ${CICD_WORKER_ID:vcs-worker-1}
