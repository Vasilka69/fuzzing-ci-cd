spring:
  application:
    name: "@project.name@"
    description: "@project.description@"
    version: "@project.version@"
  profiles:
    active: "@spring.profiles.active@"
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:fuzzing-service-executor}
      client-id: ${KAFKA_CLIENT_ID:fuzzing-service}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: ru.diplom.cicd.contracts.*
        spring.json.value.default.type: ru.diplom.cicd.contracts.job.JobMessage
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    listener:
      ack-mode: manual

logging:
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT_CONSOLE:}
    json:
      context:
        include: true
      add:
        sourceService: ${spring.application.name}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

cicd:
  executor:
    topic: ${CICD_EXECUTOR_TOPIC:jobs.fuzzing}
    worker-id: ${CICD_WORKER_ID:fuzzing-worker-1}
  fuzzing:
    kernel-root: ${CICD_FUZZING_KERNEL_ROOT:fuzzing-engine/afl-llm-engine}
    aflpp-root: ${CICD_FUZZING_AFLPP_ROOT:../AFLplusplus}
    start-fake-worker: ${CICD_FUZZING_START_FAKE_WORKER:true}
    llm-api-url: ${CICD_FUZZING_LLM_API_URL:}
    llm-api-key: ${CICD_FUZZING_LLM_API_KEY:}
    llm-model: ${CICD_FUZZING_LLM_MODEL:}

server:
  port: ${SERVER_PORT:8084}
