name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}

services:
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.1}
    hostname: kafka
    container_name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-kafka
    ports:
      - "127.0.0.1:${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:19092,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_HOST_PORT:-9092}
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - cicd-local

  kafka-init:
    image: ${KAFKA_IMAGE:-apache/kafka:3.9.1}
    container_name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - |
        topics="jobs.vcs jobs.storage jobs.build jobs.fuzzing jobs.deploy jobs.script jobs.results jobs.dead-letter"
        for topic in $$topics; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server kafka:19092 \
            --create \
            --if-not-exists \
            --topic "$$topic" \
            --partitions "${KAFKA_TOPIC_PARTITIONS:-1}" \
            --replication-factor 1
        done
    networks:
      - cicd-local
    restart: "no"

  kafka-ui:
    image: ${KAFKA_UI_IMAGE:-ghcr.io/kafbat/kafka-ui:v1.4.2}
    container_name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${KAFKA_UI_HOST_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_UI_CLUSTER_NAME:-local}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_UI_BOOTSTRAP_SERVERS:-kafka:19092}
      DYNAMIC_CONFIG_ENABLED: "false"
      GITHUB_RELEASE_INFO_ENABLED: "false"
    networks:
      - cicd-local

  opensearch:
    image: ${OPENSEARCH_IMAGE:-opensearchproject/opensearch:2.19.3}
    container_name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-opensearch
    ports:
      - "127.0.0.1:${OPENSEARCH_HOST_PORT:-9200}:9200"
      - "127.0.0.1:${OPENSEARCH_PERFORMANCE_HOST_PORT:-9600}:9600"
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms${OPENSEARCH_HEAP:-512m} -Xmx${OPENSEARCH_HEAP:-512m}
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s' >/dev/null"
        ]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - cicd-local

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16.13-alpine3.23}
    container_name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-postgres
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cicd_master_contract}
      POSTGRES_USER: ${POSTGRES_USER:-cicd_local}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-postgres-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" >/dev/null"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - cicd-local

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-09-07T16-13-09Z}
    container_name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cicd-local-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-minio-password}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - cicd-local

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z}
    container_name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_DEFAULT_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cicd-local-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-local-minio-password}
      MINIO_DEFAULT_BUCKET: ${MINIO_DEFAULT_BUCKET:-cicd-artifacts}
    networks:
      - cicd-local
    restart: "no"

networks:
  cicd-local:
    name: ${COMPOSE_PROJECT_NAME:-fuzzing-ci-cd-local}-net

volumes:
  kafka-data:
  opensearch-data:
  postgres-data:
  minio-data:
