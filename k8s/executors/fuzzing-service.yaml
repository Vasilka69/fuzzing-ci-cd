apiVersion: v1
kind: ServiceAccount
metadata:
  name: fuzzing-service
  labels:
    app.kubernetes.io/name: fuzzing-service
    app.kubernetes.io/component: executor
    app.kubernetes.io/part-of: fuzzing-ci-cd
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fuzzing-service-config
  labels:
    app.kubernetes.io/name: fuzzing-service
    app.kubernetes.io/component: executor
    app.kubernetes.io/part-of: fuzzing-ci-cd
data:
  SERVICE_NAME: "fuzzing-service"
  SERVER_PORT: "8080"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_CONSUMER_GROUP: "fuzzing-service-executor"
  KAFKA_CLIENT_ID: "fuzzing-service"
  CICD_EXECUTOR_TOPIC: "jobs.fuzzing"
  CICD_WORKER_ID: "fuzzing-worker-1"
  WORKER_ID: "fuzzing-worker-1"
  LOGGING_STRUCTURED_FORMAT_CONSOLE: "logstash"
  EXECUTOR_EVENTS_TRANSPORT: "kafka"
  OPENSEARCH_LOGS_ENABLED: "true"
  OPENSEARCH_ENDPOINT: "http://opensearch:9200"
  OPENSEARCH_EVENTS_INDEX: "executor-events"
  STORAGE_ENDPOINT: "http://storage-service:8080"
  WORKSPACE_ROOT: "/workspace"
  JAVA_TOOL_OPTIONS: "-Djava.io.tmpdir=/tmp -Duser.home=/tmp"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fuzzing-service
  labels:
    app.kubernetes.io/name: fuzzing-service
    app.kubernetes.io/component: executor
    app.kubernetes.io/part-of: fuzzing-ci-cd
    app.kubernetes.io/version: "0.1.0-SNAPSHOT"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fuzzing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fuzzing-service
        app.kubernetes.io/component: executor
        app.kubernetes.io/part-of: fuzzing-ci-cd
    spec:
      serviceAccountName: fuzzing-service
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fuzzing-service
          image: fuzzing-ci-cd/fuzzing-service:0.1.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: fuzzing-service-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
              ephemeral-storage: "4Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
              ephemeral-storage: "16Gi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: workspace
              mountPath: /workspace
            - name: fuzzing-corpus
              mountPath: /corpus
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir: {}
        - name: workspace
          emptyDir: {}
        - name: fuzzing-corpus
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fuzzing-service
  labels:
    app.kubernetes.io/name: fuzzing-service
    app.kubernetes.io/component: executor
    app.kubernetes.io/part-of: fuzzing-ci-cd
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fuzzing-service
  ports:
    - name: http
      port: 8080
      targetPort: http
