<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма для заполнения данных</title>
</head>
<body>
<h1>Заполните данные</h1>

<form action="#" method="POST">
    <label for="url">URL:</label>
    <input type="url" id="url" name="url" placeholder="Введите URL репозитория" required>
    <br><br>

    <label for="branch">Branch:</label>
    <input type="text" id="branch" name="branch" placeholder="Введите ветку" required>
    <br><br>

    <label for="login">Логин:</label>
    <input type="text" id="login" name="login" placeholder="Введите логин" required>
    <br><br>

    <label for="password">Пароль:</label>
    <input type="password" id="password" name="password" placeholder="Введите пароль" required>
    <br><br>

    <button type="submit">Отправить</button>
</form>
</body>
</html>
