spring:
  application:
    name: mock-master-publisher
  main:
    web-application-type: none
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

cicd:
  demo:
    mock-master:
      run-id: ${CICD_DEMO_RUN_ID:demo-pipeline}
      repository-url: ${CICD_DEMO_REPOSITORY_URL:file:///demo/repositories/demo-app}
      send-timeout: 10s
      stage-delay: ${CICD_DEMO_STAGE_DELAY:0s}
      topics:
        vcs: jobs.vcs
        build: jobs.build
        fuzzing: jobs.fuzzing
        deploy: jobs.deploy
        script: jobs.script
